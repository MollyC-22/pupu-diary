<div v-show="currentTab === 'achievement'" class="mb-10">
      
      <div class="mb-4 rounded-[2rem] overflow-hidden shadow-lg border-4 border-white relative bg-white">
        <img src="achievement_banner.png" alt="榮耀橫幅" class="w-full h-auto object-cover block">
      </div>
      
      <div class="text-center mb-6 px-2">
        <h2 class="font-bold text-xl text-theme mb-1">🏅 {{ profile.name || '貓貓' }}的榮耀徽章</h2>
        <p class="text-xs text-gray-500 font-bold">每一個微小的進步，都是值得紀錄的奇蹟！</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div v-for="badge in achievements" :key="badge.id" 
             class="card !p-4 !m-0 flex flex-col items-center text-center border-2 shadow-sm relative overflow-hidden transition-all duration-300"
             :class="badge.data.level > 0 ? 'bg-white border-theme-light' : 'bg-gray-50 border-gray-100 opacity-70 grayscale'">
          
          <div v-if="badge.data.level > 0" class="absolute top-0 left-0 bg-theme text-white text-[11px] font-bold px-3 py-1 rounded-br-xl shadow-sm z-10">
            Lv.{{ badge.data.level }}
          </div>
          
          <div class="w-24 h-24 rounded-full mb-3 shadow-inner overflow-hidden border-[3px] transition-all duration-500 flex items-center justify-center bg-white mt-2"
               :class="badge.data.level > 0 ? 'border-theme shadow-md' : 'border-gray-200'">
            <img :src="badge.img" class="w-full h-full object-cover transition-all duration-500" 
                 :class="badge.data.level > 0 ? '' : 'opacity-40'" alt="">
          </div>
          
          <h4 class="font-bold text-sm mb-1 transition-all" :class="badge.data.level > 0 ? 'text-[#5D4037]' : 'text-gray-400'">{{ badge.title }}</h4>
          <p class="text-[10px] font-bold mb-3 line-clamp-1 text-gray-400">{{ badge.desc }}</p>
          
          <div class="w-full bg-gray-100 rounded-full h-2 mb-1.5 shadow-inner overflow-hidden relative">
             <div class="h-full rounded-full transition-all duration-1000" 
                  :class="badge.data.level > 0 ? badge.barColor : 'bg-gray-300'" 
                  :style="{ width: badge.data.percent + '%' }"></div>
          </div>
          <div class="w-full flex justify-between items-center text-[10px] font-bold font-mono text-gray-400">
            <span :class="badge.data.level > 0 ? 'text-gray-600' : ''">{{ badge.data.current }}</span>
            <span>/ {{ badge.data.next }}</span>
          </div>
        </div>
      </div>
    </div>
